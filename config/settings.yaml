# Story key
story_slug: "mao-son-troc-quy-nhan"

# Episode planning
total_chapters: 3534
chapters_per_episode: 5

# API endpoints
comfyui_url: "http://localhost:8188"

# LLM configuration — unified per-phase settings
# provider: "ollama" | "github"
# json_format: set false for models that ignore Ollama format:json constraint
# NOTE: mistral-small:22b preferred for horror stories — looser safety alignment than llama3
# NOTE: llama3.1:8b refuses horror/occult content ("supernatural activities involving minors")
llm:
  timeout: 300
  max_retries: 3
  context_size: 32768

  # Ollama — default model shared by all phases using provider=ollama
  # Override per-phase by setting phases.<phase>.model explicitly
  ollama:
    url: "http://localhost:11434"
    default_model: "mistral-nemo:12b"

  # GitHub Models API creds (token: set PIPELINE_GITHUB_TOKEN env var — never hardcode)
  # model is shared across all phases — no per-phase override needed
  github:
    api_url: "https://models.inference.ai.azure.com"
    model: "Meta-Llama-3.1-405B-Instruct"  # gpt-5 has 1 req/min limit even on Pro+; gpt-4.1 has much higher limits
    rpm: 10            # proactive throttle: requests per minute (gpt-4.1=10, gpt-5=1)
    max_input_tokens: 7000  # gpt-4.1 free tier cap = 8000 total; 7000 leaves room for system prompt + output    max_output_tokens: 4096  # explicit output cap; prevents silent truncation on free-tier models

  # Google Gemini API (api_key: set PIPELINE_GEMINI_API_KEY env var — never hardcode)
  gemini:
    model: "gemini-2.0-flash"
    rpm: 15            # free tier: 15 RPM
    max_output_tokens: 8192

  # Per-phase config — set provider + json_format only
  # model: omit (or leave empty) to use ollama.default_model; set explicitly to override per-phase
  phases:
    summary:
      provider: "ollama"
      json_format: false   # plain text response — no JSON constraint
    script:
      provider: "ollama"
      json_format: true
    image_prompt:
      provider: "ollama"
      json_format: true

# ComfyUI configuration
comfyui_timeout: 300
comfyui_poll_interval: 2

# Image generation (9:16 portrait) — 768x1024 gives wider canvas for background depth
# while staying within 8GB VRAM budget for PonyXL SDXL
image_width: 768
image_height: 1024

# Thumbnail (16:9 landscape)
thumbnail_width: 1280
thumbnail_height: 720

# Video settings
fps: 30
target_duration_sec: 60
shot_duration_sec: 6

# Audio
tts_voice: "vi-VN-HoaiMyNeural"
bgm_volume_db: -15
tts_lead_in_sec: 0.2
tts_tail_padding_sec: 0.5

# Multi-frame & motion settings
frames_per_shot: 4              # images per shot (1 = legacy, 4 = richer motion)
crossfade_duration: 0.5         # seconds, crossfade between frames within a shot
shot_transition_duration: 0.3   # seconds, transition between shots
shot_transition_type: "dissolve" # FFmpeg xfade transition type

# Pipeline feature flags
enable_svd: false

# Paths (relative to project root)
data_dir: "data/{story_slug}"
db_path: "data/{story_slug}.db"
logs_dir: "logs"
assets_dir: "assets"

# LoRA weights for ComfyUI (Pony V6 XL)
lora_weights:
  xianxia_fantasy: 0.5
  dark_horror: 0.6
  ink_wash: 0.0
