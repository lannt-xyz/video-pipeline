# Story source
story_slug: "mao-son-troc-quy-nhan"
base_url: "https://truyencv.io/truyen/{story_slug}/chuong-{n}/"
total_chapters: 3534
chapters_per_episode: 5

# API endpoints
ollama_url: "http://localhost:11434"
comfyui_url: "http://localhost:8188"

# LLM configuration qwen3.5:cloud
llm_model: "gemma4-32k:latest"
llm_timeout: 120
llm_max_retries: 3
llm_context_size: 16384

# ComfyUI configuration
comfyui_timeout: 300
comfyui_poll_interval: 2

# Image generation (9:16 portrait)
image_width: 720
image_height: 1280

# Thumbnail (16:9 landscape)
thumbnail_width: 1280
thumbnail_height: 720

# Video settings
fps: 30
target_duration_sec: 60
shot_duration_sec: 6

# Audio
tts_voice: "vi-VN-HoaiMyNeural"
bgm_volume_db: -15

# Multi-frame & motion settings
frames_per_shot: 2              # images per shot (1 = legacy, 2 = multi-frame)
crossfade_duration: 0.5         # seconds, crossfade between frames within a shot
shot_transition_duration: 0.3   # seconds, transition between shots
shot_transition_type: "dissolve" # FFmpeg xfade transition type

# Pipeline feature flags
enable_svd: false

# Paths (relative to project root)
data_dir: "data"
db_path: "db/pipeline.db"
logs_dir: "logs"
assets_dir: "assets"

# Crawler
crawler_rate_limit: 1.0
crawler_max_retries: 5

# LoRA weights for ComfyUI (Pony V6 XL)
lora_weights:
  manhua_style: 0.7
  xianxia_fantasy: 0.5
  dark_horror: 0.4
  ink_wash: 0.6
