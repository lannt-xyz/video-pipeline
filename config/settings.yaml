# Story key
story_slug: "mao-son-troc-quy-nhan"

# Episode planning
total_chapters: 3534
chapters_per_episode: 1

# API endpoints
comfyui_url: "http://comfyui:8188"

# LLM configuration — unified per-phase settings
# provider: "ollama" | "github"
# json_format: set false for models that ignore Ollama format:json constraint
# NOTE: mistral-small:22b preferred for horror stories — looser safety alignment than llama3
# NOTE: llama3.1:8b refuses horror/occult content ("supernatural activities involving minors")
llm:
  timeout: 300
  max_retries: 3
  context_size: 32768

  # Ollama — default model shared by all phases using provider=ollama
  # Override per-phase by setting phases.<phase>.model explicitly
  ollama:
    url: "http://ollama:11434"
    default_model: "gemma4:e4b"
    num_gpu: 999          # 999 = force all layers on GPU (full GPU offload)
    keep_alive: "5m"      # "-1" = giữ model trong VRAM mãi; "0" = unload ngay sau request (nhường VRAM cho ComfyUI)
    flash_attention: true

  # GitHub Models API creds (token: set PIPELINE_GITHUB_TOKEN env var — never hardcode)
  # model is shared across all phases — no per-phase override needed
  github:
    api_url: "https://models.inference.ai.azure.com"
    model: "Meta-Llama-3.1-405B-Instruct"  # gpt-5 has 1 req/min limit even on Pro+; gpt-4.1 has much higher limits
    rpm: 10            # proactive throttle: requests per minute (gpt-4.1=10, gpt-5=1)
    max_input_tokens: 7000  # gpt-4.1 free tier cap = 8000 total; 7000 leaves room for system prompt + output    max_output_tokens: 4096  # explicit output cap; prevents silent truncation on free-tier models

  # Google Gemini API (api_key: set PIPELINE_GEMINI_API_KEY env var — never hardcode)
  gemini:
    model: "gemini-3-flash"
    rpm: 5            # free tier: 15 RPM
    max_output_tokens: 8192

  # DeepSeek API (api_key: set PIPELINE_DEEPSEEK_API_KEY env var — never hardcode)
  # OpenAI-compatible endpoint at https://api.deepseek.com
  # Models:
  #   - deepseek-v4-flash (fast, non-thinking by default)
  #   - deepseek-v4-pro   (thinking-capable; set thinking=true)
  #   - deepseek-chat / deepseek-reasoner (legacy, deprecated 2026-07-24)
  deepseek:
    base_url: "https://api.deepseek.com"
    model: "deepseek-v4-flash"
    rpm: 60
    max_output_tokens: 8192
    thinking: false           # enable reasoning/thinking mode (use deepseek-v4-pro)
    reasoning_effort: "medium"  # "low" | "medium" | "high" — only when thinking=true

  # Per-phase config — set provider + json_format only
  # model: omit (or leave empty) to use ollama.default_model; set explicitly to override per-phase
  phases:
    summary:
      provider: "ollama"
      json_format: false   # plain text response — no JSON constraint
    script:
      provider: "ollama"
      json_format: true
    image_prompt:
      provider: "ollama"
      json_format: true

# ComfyUI configuration
comfyui_timeout: 300
comfyui_poll_interval: 2

# Image generation (9:16 portrait) — 768x1024 gives wider canvas for background depth
# while staying within 8GB VRAM budget for PonyXL SDXL
image_width: 768
image_height: 1024

# Flux Redux — character identity conditioning strength (0.0 = disabled, 1.0 = full clone)
# 0.25-0.35: subtle identity anchor without over-cloning character appearance into background
redux_strength: 0.1

# Flux Redux — scene reference conditioning strength for intra-scene background consistency
# Applied to shots 2+ within the same scene_id using the first shot as visual reference
# 0.15-0.25 recommended — lower than redux_strength to avoid locking composition
scene_ref_strength: 0.2

# Thumbnail (16:9 landscape)
thumbnail_width: 1280
thumbnail_height: 720

# Video settings
fps: 30
target_duration_sec: 60
shot_duration_sec: 6

# Audio
tts_provider: "f5tts"          # "edge" = edge-tts (cloud) | "piper" = local Piper | "f5tts" = local F5-TTS GPU
tts_voice: "vi-VN-HoaiMyNeural"  # used when tts_provider=edge
piper_model: "vi_VN-vais1000-medium"  # used when tts_provider=piper
piper_models_dir: "models/piper"   # local cache dir for .onnx model files
piper_speed: 1.1                   # atempo multiplier: 1.0=normal, 1.1=10% faster (more engaging)
f5tts_model_dir: "models/f5tts"    # local cache dir for F5-TTS VI checkpoint
f5tts_ref_audio: "assets/ref_voice.wav"  # 6-30s Vietnamese reference audio for voice cloning
f5tts_ref_text: "Xin chào, tôi là người kể chuyện. Câu chuyện hôm nay sẽ đưa bạn vào một thế giới đầy bí ẩn và rùng rợn."  # transcript of ref audio
f5tts_speed: 1.15                  # generation speed multiplier. Calibrated so actual rate ≈ 2.5 wps Vietnamese. 1.6 → 3.5 wps (rushed); 1.3 → 2.85 wps (still rushed vs comfort target); 1.15 → ~2.5 wps (natural narration). Pipeline word-budget (LLM prompt, script_reviewer, _validate_narration_length) is now synced to 2.5 wps so 60s video ≈ 150 words; audio length matches planned shot durations within ±10%, eliminating systemic video-stretching.
f5tts_device: "cuda"               # "cuda" (fast, ~6GB VRAM) | "cpu" (slow, RAM only)
bgm_volume_db: -15
# Lead-in silence at the start of every shot's mixed audio. Must be >= shot_transition_duration
# so that spoken narration starts only after the video crossfade has completed (avoids
# hearing first words while the previous shot is still partially visible).
tts_lead_in_sec: 0.3
tts_tail_padding_sec: 0.5

# Multi-frame & motion settings
frames_per_shot: 2              # images per shot — frame 0 = opening action, frame 1 = closing action
crossfade_duration: 0.5         # seconds, crossfade between frames within a shot
shot_transition_duration: 0.3   # seconds, transition between shots
shot_transition_type: "dissolve" # FFmpeg xfade transition type

# Pipeline feature flags
enable_svd: false

# Paths (relative to project root)
data_dir: "data/{story_slug}"
db_path: "data/{story_slug}.db"
logs_dir: "logs"
assets_dir: "assets"

# LoRA weights for ComfyUI (Pony V6 XL)
lora_weights:
  xianxia_fantasy: 0.5
  dark_horror: 0.6
  ink_wash: 0.0

# Retention / attention-constraint system (Phase 1+).
# Feature flag controls whether the constraint pipeline (V2 scriptwriter, hook
# competitive selection, gatekeeper reviewer) is active. Default off → legacy
# behavior preserved. Thresholds are placeholders calibrated by Phase 1b
# baseline + Phase 6 hand-rating.
retention:
  use_constraint_system: false        # master flag — flip to true after PR4 verify
  max_exposition_ratio: 0.5           # placeholder; calibrate from baseline percentile 60
  max_consecutive_same_energy: 2      # >2 same-energy shots → WARNING
  lore_curiosity_buffer_shots: 2      # tension shots required before introducing a lore term
  hook_min_score: 0.65                # hook total_score below this → 1 retry
  reviewer_max_retries: 2             # gatekeeper retry budget per episode
  hook_judge_weights:
    curiosity_gap: 0.5
    specificity: 0.25
    pattern_interrupt: 0.25
