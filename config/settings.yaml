# Story key
story_slug: "mao-son-troc-quy-nhan"

# Episode planning
total_chapters: 3534
chapters_per_episode: 5

# API endpoints
ollama_url: "http://localhost:11434"
comfyui_url: "http://localhost:8188"

# LLM configuration gemma4-32k:latest
llm_model: "gpt-oss:20b"
# Phase-specific model overrides (empty = use llm_model)
summary_model: "gpt-oss:20b"
# qwen2.5:14b, mistral-small:22b, gpt-oss:20b
script_model: "gpt-oss:20b"
# Set false when script_model does not support Ollama constrained JSON decoding (e.g. gpt-oss family)
# Only affects the script client — summary/other clients always use native format mode
script_json_format: false
# Set false when summary_model does not support Ollama constrained JSON decoding
summary_json_format: false
# Set false when llm_model does not support Ollama constrained JSON decoding
llm_json_format: false
llm_timeout: 120
llm_max_retries: 3
llm_context_size: 32768

# GitHub Models API — used when script_provider = "github"
# Switch script/scene-prompt generation to GPT-5 or gpt-4.1 via GitHub API
script_provider: "ollama"       # "ollama" | "github"
github_api_url: "https://models.inference.ai.azure.com"
github_model: "gpt-4.1"      # gpt-5 has 1 req/min limit even on Pro+; gpt-4.1 has much higher limits
github_rpm: 10                # proactive throttle: requests per minute (gpt-4.1=10, gpt-5=1)
# Token: set PIPELINE_GITHUB_TOKEN env var — never put the real token here

# ComfyUI configuration
comfyui_timeout: 300
comfyui_poll_interval: 2

# Image generation (9:16 portrait) — 768x1024 gives wider canvas for background depth
# while staying within 8GB VRAM budget for PonyXL SDXL
image_width: 768
image_height: 1024

# Thumbnail (16:9 landscape)
thumbnail_width: 1280
thumbnail_height: 720

# Video settings
fps: 30
target_duration_sec: 60
shot_duration_sec: 6

# Audio
tts_voice: "vi-VN-HoaiMyNeural"
bgm_volume_db: -15
tts_lead_in_sec: 0.2
tts_tail_padding_sec: 0.5

# Multi-frame & motion settings
frames_per_shot: 4              # images per shot (1 = legacy, 4 = richer motion)
crossfade_duration: 0.5         # seconds, crossfade between frames within a shot
shot_transition_duration: 0.3   # seconds, transition between shots
shot_transition_type: "dissolve" # FFmpeg xfade transition type

# Pipeline feature flags
enable_svd: false

# Paths (relative to project root)
data_dir: "data/{story_slug}"
db_path: "data/{story_slug}.db"
logs_dir: "logs"
assets_dir: "assets"

# LoRA weights for ComfyUI (Pony V6 XL)
lora_weights:
  manhua_style: 0.7
  xianxia_fantasy: 0.5
  dark_horror: 0.6
  ink_wash: 0.0
